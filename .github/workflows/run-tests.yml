name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests/unit -p "test_*.py" -v

      - name: Run validation tests
        run: python -m unittest discover -s tests/validation -p "test_*.py" -v

      - name: Run integration tests
        run: python -m unittest discover -s tests/integration -p "test_*.py" -v

      - name: Run ablation tests
        run: python -m unittest discover -s tests/ablation -p "test_*.py" -v

      - name: Run robustness tests
        run: python -m unittest discover -s tests/robustness -p "test_*.py" -v

      - name: Run scaling tests
        run: python -m unittest discover -s tests/scaling -p "test_*.py" -v

      - name: Verify manuscript constants
        run: |
          python -c "
          from src.energy_model import (ALPHA_D, ALPHA_S, ALPHA_STAR, NU, KAPPA,
                                         ETA, FSS_A, FSS_B, barrier_density)
          assert abs(ALPHA_D    - 3.86)   < 0.001
          assert abs(ALPHA_S    - 4.267)  < 0.001
          assert abs(ALPHA_STAR - 4.20)   < 0.01
          assert abs(NU         - 2.30)   < 0.01
          assert abs(KAPPA      - 1.80)   < 0.05
          assert abs(ETA        - 0.22)   < 0.02
          assert abs(FSS_A      - 0.036)  < 0.001
          assert abs(FSS_B      -(-1.37)) < 0.01
          assert abs(barrier_density(4.20) - 0.021) < 0.003
          print('All manuscript constants verified: OK')
          "
