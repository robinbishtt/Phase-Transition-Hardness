# Experiment Configuration for Phase-Transition-Hardness
# This file defines default parameters for all experiments

# =============================================================================
# System Configuration
# =============================================================================
system:
  # Default system sizes (number of variables)
  ns: [100, 200, 400, 800]
  
  # Clause length (k-SAT)
  k: 3
  
  # Master random seed for reproducibility
  # Format: YYYYMMDD (publication date)
  master_seed: 20240223

# =============================================================================
# Constraint Density (Alpha) Ranges
# =============================================================================
alpha:
  # Full sweep range
  full:
    min: 3.0
    max: 5.0
    step: 0.05
  
  # Critical region (high resolution)
  critical:
    min: 4.0
    max: 4.4
    step: 0.02
  
  # Quick test range
  quick:
    min: 3.5
    max: 4.5
    step: 0.25

# =============================================================================
# Sampling Configuration
# =============================================================================
sampling:
  # Number of instances per (n, α) point
  n_instances:
    full: 1000
    medium: 500
    quick: 100
    minimal: 20
  
  # Confidence level for intervals
  confidence_level: 0.95
  
  # Bootstrap samples for confidence intervals
  n_bootstrap: 1000

# =============================================================================
# Solver Configuration
# =============================================================================
solver:
  # Default solver
  default: dpll
  
  # DPLL settings
  dpll:
    max_decisions: 100000
  
  # WalkSAT settings
  walksat:
    max_flips: 100000
    noise: 0.57
    restarts: 5

# =============================================================================
# Finite-Size Scaling Configuration
# =============================================================================
fss:
  # Initial guesses for optimization
  alpha_s_init: 4.267
  nu_init: 2.3
  
  # Optimization settings
  max_iterations: 2000
  tolerance: 1.0e-6

# =============================================================================
# Output Configuration
# =============================================================================
output:
  # Default output directory
  directory: results
  
  # Subdirectories
  subdirectories:
    figures: figures
    data: data
    logs: logs
  
  # File formats
  formats:
    data: npz
    summary: json
    figures: pdf

# =============================================================================
# Validation Thresholds
# =============================================================================
validation:
  # Threshold ranges (from manuscript)
  alpha_s:
    min: 4.20
    max: 4.35
    expected: 4.267
  
  alpha_star:
    min: 4.10
    max: 4.40
    expected: 4.20
  
  gamma_max:
    min: 0.005
    max: 0.05
    expected: 0.015
  
  nu:
    min: 1.5
    max: 3.5
    expected: 2.30
  
  # Quality thresholds
  exponential_scaling:
    min_r2: 0.85
  
  fss_collapse:
    max_residual: 0.10

# =============================================================================
# Hardware Configuration
# =============================================================================
hardware:
  # Parallel processing
  n_jobs: -1  # -1 for all cores
  
  # Memory limits (GB)
  memory_limit: 32
  
  # Timeout (seconds)
  timeout: 3600

# =============================================================================
# Phase Transition Thresholds (Literature Values)
# =============================================================================
thresholds:
  # Clustering threshold
  alpha_d: 3.86
  
  # Rigidity threshold
  alpha_r: 4.00
  
  # Condensation threshold
  alpha_c: 4.10
  
  # Satisfiability threshold
  alpha_s: 4.267
