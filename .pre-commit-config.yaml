# Pre-commit hooks for Phase-Transition-Hardness
# Install:
#   pip install pre-commit
#   pre-commit install          # activates for every future commit
#   pre-commit run --all-files  # run manually on all files
#
# Each hook auto-fixes issues and stages the corrected files.
# The commit is blocked until all hooks pass cleanly.

repos:
  # ── Black: deterministic Python formatter ──────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=100, --target-version=py310]
        files: ^(src|tests|experiments|ablation|figures)/.*\.py$

  # ── isort: import order (Black-compatible profile) ─────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]
        files: ^(src|tests|experiments|ablation|figures)/.*\.py$

  # ── ruff: fast linter (pyflakes + pycodestyle + bugbear) ───────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args:
          - --select=E,F,W,UP,B,C4,SIM
          - --line-length=100
          - --fix
        files: ^(src|tests|experiments|ablation|figures)/.*\.py$

  # ── Trailing whitespace + end-of-file newlines ─────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: ^(notebooks/.*\.ipynb|data/.*\.npz)$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
        exclude: ^notebooks/
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── mypy: static type checking (non-blocking: always-pass) ────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --no-error-summary
        files: ^src/.*\.py$
        pass_filenames: false
        # mypy failures are reported as warnings; they do not block commits
        # because the codebase uses dynamic typing in several hot paths.
        # Remove 'verbose: true' below to suppress mypy output entirely.
        verbose: false

# Global settings
default_language_version:
  python: python3.11

# Files to skip entirely
exclude: |
  (?x)^(
    \.git/.*|
    __pycache__/.*|
    .*\.pyc|
    notebooks/.*\.ipynb|
    data/.*\.npz|
    results/.*
  )$
